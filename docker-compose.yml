version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: haqms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: haqms
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    command: postgres -c 'max_connections=200'

volumes:
  pgdata:
